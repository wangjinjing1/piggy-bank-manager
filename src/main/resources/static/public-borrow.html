<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>填写借款信息</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="publicApp" class="login-shell" v-cloak>
  <form class="login-panel wide" v-if="!done" @submit.prevent="submit">
    <h1>填写借款信息</h1>
    <label>借款人姓名<input v-model.trim="form.borrowerName" required></label>
    <label>手机号<input v-model.trim="form.phone" required></label>
    <label>邮箱<input type="email" v-model.trim="form.email" required></label>
    <label>借款金额<input type="number" min="0.01" step="0.01" v-model.number="form.amount" required></label>
    <label>借款日期<span class="date-field"><input type="date" v-model="form.borrowDate" required><span v-if="!form.borrowDate">年 / 月 / 日</span></span></label>
    <label>还款日期<span class="date-field"><input type="date" v-model="form.dueDate"><span v-if="!form.dueDate">年 / 月 / 日</span></span></label>
    <button class="primary">提交</button>
    <p class="error" v-if="error">{{ error }}</p>
  </form>
  <section class="login-panel" v-else>
    <h1>提交成功</h1>
    <p class="hint">信息已提交，待审核通过后会通过邮件通知您。</p>
  </section>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
Vue.createApp({
  data() {
    const today = new Date().toISOString().slice(0, 10);
    return { done: false, error: '', form: { borrowerName: '', phone: '', email: '', amount: null, borrowDate: today, dueDate: '9999-12-31' } };
  },
  methods: {
    async submit() {
      this.error = '';
      try {
        const body = { ...this.form, dueDate: this.form.dueDate || null };
        const res = await fetch(`/api/public/borrow-links/${token}/submit`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const json = await res.json();
        if (!json.success) { this.error = json.message || '提交失败'; return; }
        this.done = true;
      } catch (e) {
        this.error = e.message;
      }
    }
  }
}).mount('#publicApp');
</script>
</body>
</html>
